<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D · Repository Browser — Do it! 알고리즘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg:       #f7f5f0;
  --panel:    #ffffff;
  --panel-2:  #fbf9f4;
  --border:   #e8e2d4;
  --border-2: #d8d0bd;
  --ink:      #1f1a14;
  --ink-2:    #4a4339;
  --ink-3:    #7a6f5e;
  --mute:     #a39681;
  --accent:   #c96442;
  --accent-2: #2a6fdb;
  --ok:       #4a8a5c;
  --warn:     #b88b1e;
  --bad:      #b85a3a;
  --code-bg:  #f3efe6;
  --hl:       #fff4d3;
  --p1: #4a8a5c; --p2: #2a6fdb; --p3: #c96442; --p4: #8a4a8a;
  --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  --sans: "IBM Plex Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --serif: "Gowun Batang", "Noto Serif KR", Georgia, serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
body { font-size: 14px; line-height: 1.55; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }

/* ── nav.js 바 보정 ── */
body { padding-top: 0 !important; }

/* ── topbar ── */
.topbar {
  position: sticky; top: 0; z-index: 20;
  background: rgba(247,245,240,.92); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}
.topbar-row { display: flex; align-items: center; gap: 14px; padding: 10px 20px; height: 48px; }
.logo { display: flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: -.01em; font-size: 14px; }
.logo-mark {
  width: 22px; height: 22px; border-radius: 6px; background: var(--ink); color: #fff;
  display: grid; place-items: center;
  font-family: var(--mono); font-size: 11px; font-weight: 700;
}
.crumb { display: flex; align-items: center; gap: 6px; color: var(--ink-3); font-family: var(--mono); font-size: 12.5px; }
.crumb .sep { color: var(--mute); }
.crumb .here { color: var(--ink); font-weight: 500; }
.crumb a:hover { color: var(--accent); text-decoration: underline; }
.search {
  margin-left: auto; display: flex; align-items: center; gap: 8px;
  background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
  padding: 5px 10px; width: 260px;
  font-family: var(--mono); font-size: 12.5px; color: var(--ink-3);
}
.search input { border: 0; outline: 0; background: none; flex: 1; font: inherit; color: var(--ink); }
.search kbd {
  font-family: var(--mono); font-size: 10.5px; color: var(--mute);
  background: var(--bg); border: 1px solid var(--border); border-bottom-width: 2px;
  border-radius: 4px; padding: 1px 5px;
}

/* ── progress strip ── */
.strip {
  display: flex; align-items: stretch; gap: 0;
  padding: 8px 20px 10px; border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(247,245,240,.6), rgba(247,245,240,0));
}
.strip-label {
  display: flex; flex-direction: column; justify-content: center;
  font-family: var(--mono); font-size: 10.5px; color: var(--mute);
  letter-spacing: .12em; text-transform: uppercase;
  margin-right: 14px; min-width: 88px;
}
.strip-label b { color: var(--ink); font-weight: 700; font-size: 13px; letter-spacing: 0; text-transform: none; margin-top: 2px; }
.strip-track {
  flex: 1; display: grid; gap: 3px; align-items: end;
  padding-top: 8px; position: relative;
}
.strip-cell {
  position: relative; height: 32px;
  display: flex; flex-direction: column; align-items: center; cursor: pointer;
}
.strip-bar { width: 100%; height: 6px; border-radius: 2px; background: var(--border); transition: background .15s, height .15s; }
.strip-cell.done .strip-bar { background: var(--p1); }
.strip-cell[data-phase="2"].done .strip-bar { background: var(--p2); }
.strip-cell[data-phase="3"].done .strip-bar { background: var(--p3); }
.strip-cell[data-phase="4"].done .strip-bar { background: var(--p4); }
.strip-cell.now .strip-bar {
  height: 18px; border-radius: 3px; background: var(--ink);
  box-shadow: 0 0 0 3px var(--bg), 0 0 0 4px var(--ink);
}
.strip-cell:hover .strip-bar { filter: brightness(1.1); }
.strip-cell.now .strip-num { color: var(--ink); font-weight: 700; }
.strip-num { font-family: var(--mono); font-size: 9.5px; color: var(--mute); margin-top: 3px; }
.strip-meta {
  margin-left: 14px; display: flex; flex-direction: column; justify-content: center;
  text-align: right; font-family: var(--mono); font-size: 10.5px; color: var(--mute); min-width: 72px;
}
.strip-meta b { color: var(--ok); font-size: 14px; font-weight: 700; font-family: var(--mono); }

/* ── layout ── */
.shell { display: grid; grid-template-columns: 240px 1fr; gap: 0; min-height: calc(100vh - 104px); }

/* ── sidebar ── */
.side {
  border-right: 1px solid var(--border); background: var(--panel-2);
  padding: 8px 0; overflow-y: auto;
  height: calc(100vh - 104px); position: sticky; top: 104px;
}
.side::-webkit-scrollbar { width: 3px; }
.side::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }
.side-section {
  padding: 5px 14px 3px;
  font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--mute);
  display: flex; align-items: center; justify-content: space-between;
}
.side-section .count { color: var(--ink-3); font-weight: 500; }
.tree { padding: 1px 4px 12px; }
.row {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 7px; border-radius: 4px; cursor: pointer;
  font-size: 12.5px; color: var(--ink-2); user-select: none; line-height: 1.35; min-height: 22px;
}
.row:hover { background: rgba(0,0,0,.045); }
.row.on { background: rgba(201,100,66,.10); color: var(--ink); }
.row .chev { width: 11px; color: var(--mute); font-family: var(--mono); font-size: 10px; flex: 0 0 11px; text-align: center; transition: transform .12s; }
.row.open > .chev { transform: rotate(90deg); }
.row .icon { width: 13px; flex: 0 0 13px; display: grid; place-items: center; color: var(--ink-3); }
.row .icon svg { display: block; }
.row .name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row .name .num { font-family: var(--mono); font-size: 11px; color: var(--mute); margin-right: 2px; }
.row .badge {
  font-family: var(--mono); font-size: 10px; color: var(--mute);
  background: var(--border); border-radius: 99px;
  padding: 0 6px; line-height: 15px; height: 15px;
}
.row .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--p1); flex: 0 0 5px; }
.row[data-phase="2"] .dot { background: var(--p2); }
.row[data-phase="3"] .dot { background: var(--p3); }
.row[data-phase="4"] .dot { background: var(--p4); }
.children { display: none; padding-left: 12px; }
.row.open + .children { display: block; }
.row.l2 { padding-left: 12px; font-size: 12px; }
.row.l3 { padding-left: 12px; font-size: 11.5px; color: var(--ink-3); font-family: var(--mono); min-height: 20px; }
.row.l3:hover { color: var(--ink); }
.row.l3.on { color: var(--ink); background: rgba(42,111,219,.10); }

/* ── content ── */
.main { padding: 20px 28px 48px; max-width: 1000px; }
.pagehead {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 20px;
}
.pagehead h1 { font-size: 22px; font-weight: 700; margin: 0 0 5px; letter-spacing: -.01em; line-height: 1.25; }
.pagehead .lede { color: var(--ink-3); font-size: 13px; line-height: 1.55; max-width: 580px; }
.pagehead .pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 9px; border-radius: 99px; background: var(--bg); border: 1px solid var(--border);
  font-size: 11px; font-family: var(--mono); color: var(--ink-3); height: 22px;
}
.pagehead .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--p1); }
.pagehead .meta { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex: 0 0 auto; }

/* home stat cards */
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 24px; }
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; }
.card .k { font-family: var(--mono); font-size: 10px; color: var(--mute); letter-spacing: .12em; text-transform: uppercase; }
.card .v { font-family: var(--mono); font-size: 24px; font-weight: 700; letter-spacing: -.02em; margin-top: 5px; }
.card .sub { font-size: 12px; color: var(--ink-3); margin-top: 3px; }
.card .bar { margin-top: 8px; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
.card .bar > div { height: 100%; background: var(--accent); border-radius: 99px; }
.card.now .v { font-size: 16px; line-height: 1.3; }
.card.now .v .wk { color: var(--accent); margin-right: 8px; }

h2.sec {
  font-size: 12px; font-family: var(--mono); letter-spacing: .14em;
  text-transform: uppercase; color: var(--mute);
  margin: 24px 0 10px; display: flex; align-items: center; gap: 10px;
}
h2.sec::after { content: ""; flex: 1; height: 1px; background: var(--border); }

/* feed */
.feed { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.feed-row {
  display: grid; grid-template-columns: 60px 1fr auto;
  gap: 12px; align-items: center; padding: 9px 16px;
  border-top: 1px solid var(--border); cursor: pointer;
}
.feed-row:first-child { border-top: 0; }
.feed-row:hover { background: var(--panel-2); }
.feed-row .when { font-family: var(--mono); font-size: 11px; color: var(--mute); }
.feed-row .what { display: flex; align-items: center; gap: 8px; min-width: 0; }
.feed-row .what .icon { width: 14px; flex: 0 0 14px; color: var(--ink-3); }
.feed-row .what .ttl { font-size: 13px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.feed-row .what .path { font-family: var(--mono); font-size: 11px; color: var(--mute); margin-left: 5px; }
.feed-row .by { font-size: 11.5px; color: var(--ink-3); display: flex; align-items: center; gap: 5px; }
.avatar {
  width: 18px; height: 18px; border-radius: 50%;
  display: inline-grid; place-items: center;
  font-size: 10px; color: #fff; font-weight: 600; font-family: var(--mono);
}

/* week page */
.wk-head { display: grid; grid-template-columns: auto 1fr; gap: 14px; align-items: start; margin-bottom: 16px; }
.wk-num {
  font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--mute);
  display: flex; flex-direction: column; align-items: center;
  border: 1px solid var(--border); border-radius: 10px;
  padding: 8px 12px; background: var(--panel); min-width: 72px;
}
.wk-num b { font-size: 26px; color: var(--ink); font-weight: 700; letter-spacing: -.02em; }
.wk-num .date { margin-top: 3px; font-size: 10.5px; color: var(--ink-3); letter-spacing: 0; text-transform: none; }
.wk-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.wk-tag {
  font-family: var(--mono); font-size: 10.5px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 99px;
  padding: 1px 8px; color: var(--ink-3);
}

/* folder grid */
.folder-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin-top: 6px; }
.folder-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; cursor: pointer;
  transition: border-color .12s;
}
.folder-card:hover { border-color: var(--ink-3); }
.folder-card .fh { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
.folder-card .fh .icon { color: var(--ink-3); }
.folder-card .fh .name { font-family: var(--mono); font-size: 12.5px; color: var(--ink); font-weight: 500; }
.folder-card .fh .count { margin-left: auto; font-family: var(--mono); font-size: 10.5px; color: var(--mute); }
.folder-card ul { margin: 0; padding: 0; list-style: none; }
.folder-card li { padding: 2px 0; font-size: 12px; color: var(--ink-2); display: flex; gap: 7px; align-items: center; font-family: var(--mono); }
.folder-card li .fi { color: var(--mute); width: 12px; flex: 0 0 12px; }
.folder-card li .fn { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* filebar */
.filebar {
  display: flex; align-items: center; gap: 0;
  border: 1px solid var(--border); border-bottom: 0; border-radius: 10px 10px 0 0;
  background: var(--panel-2); padding: 8px 14px;
  font-family: var(--mono); font-size: 12px; color: var(--ink-2);
}
.filebar .path { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.filebar .meta { color: var(--mute); font-size: 11px; display: flex; gap: 14px; align-items: center; }
.filebar .meta .avatar { vertical-align: -3px; margin-right: 4px; }

/* reader */
.reader {
  background: var(--panel); border: 1px solid var(--border); border-radius: 0 0 10px 10px;
  padding: 36px 56px 48px;
  font-family: var(--serif); font-size: 17px; line-height: 1.85; color: var(--ink); max-width: 780px;
}
.reader h1 { font-family: var(--sans); font-size: 28px; font-weight: 700; line-height: 1.25; letter-spacing: -.015em; margin: 0 0 10px; }
.reader h2 { font-family: var(--sans); font-size: 20px; font-weight: 700; margin: 40px 0 10px; letter-spacing: -.005em; padding-top: 10px; border-top: 1px solid var(--border); }
.reader h3 { font-family: var(--sans); font-size: 16px; font-weight: 600; margin: 28px 0 8px; color: var(--ink-2); }
.reader p { margin: 0 0 16px; }
.reader p > strong, .reader li > strong { background: var(--hl); padding: 0 3px; border-radius: 3px; font-weight: 700; }
.reader blockquote { margin: 20px 0; padding: 12px 20px; border-left: 3px solid var(--accent); background: var(--panel-2); color: var(--ink-2); border-radius: 0 8px 8px 0; font-family: var(--sans); font-size: 15px; line-height: 1.65; }
.reader blockquote p { margin: 0 0 8px; }
.reader blockquote p:last-child { margin: 0; }
.reader ul, .reader ol { padding-left: 22px; margin: 0 0 16px; }
.reader li { margin: 5px 0; }
.reader code { font-family: var(--mono); font-size: .86em; background: var(--code-bg); padding: 1px 6px; border-radius: 4px; color: var(--accent); }
.reader pre { background: #1f1a14; color: #f0ebe0; border-radius: 8px; padding: 18px 22px; font-family: var(--mono); font-size: 13.5px; line-height: 1.65; overflow-x: auto; margin: 18px 0; }
.reader pre code { background: none; color: inherit; padding: 0; font-size: inherit; }
.reader hr { border: 0; border-top: 1px solid var(--border); margin: 28px 0; }
.reader table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 14px; font-family: var(--sans); }
.reader th { background: var(--panel-2); padding: 8px 12px; text-align: left; border: 1px solid var(--border); font-weight: 600; }
.reader td { padding: 8px 12px; border: 1px solid var(--border); }
.reader img { max-width: 100%; border-radius: 6px; }
.reader a { color: var(--accent-2); }

/* code viewer */
.codeview {
  background: #1f1a14; border: 1px solid var(--border); border-top: 0; border-radius: 0 0 10px 10px;
  color: #e8e2d4; display: grid; grid-template-columns: 42px 1fr;
  font-family: var(--mono); font-size: 13px; line-height: 1.65; overflow: hidden;
}
.codeview .ln { background: #181410; color: #6a6055; padding: 14px 8px 14px 0; text-align: right; border-right: 1px solid #2b251c; user-select: none; }
.codeview .ln span { display: block; }
.codeview pre { margin: 0; padding: 14px 18px; overflow-x: auto; white-space: pre; }

/* misc */
.empty { padding: 40px; text-align: center; color: var(--ink-3); background: var(--panel); border: 1px dashed var(--border); border-radius: 10px; font-family: var(--mono); font-size: 13px; }
.loading { padding: 48px; text-align: center; color: var(--mute); font-family: var(--mono); font-size: 13px; animation: pulse 1s ease infinite alternate; }
.badge-pill { font-family: var(--mono); font-size: 11px; padding: 2px 8px; border-radius: 99px; background: var(--border); color: var(--ink-2); }
.badge-done    { background: #e1f3e6; color: #2e6a40; }
.badge-current { background: #dde6fc; color: #2a4f9a; }

@keyframes pulse { from { opacity: .4; } to { opacity: 1; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <div class="logo">
      <div class="logo-mark">D!</div>
      <span>doit-algorithm-study</span>
    </div>
    <div class="crumb" id="crumb"></div>
    <div class="search">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input placeholder="주차 또는 파일 검색…" id="searchInput">
    </div>
  </div>
  <div class="strip">
    <div class="strip-label">2026 시즌 1<b id="stripTitle">커리큘럼</b></div>
    <div class="strip-track" id="stripTrack"></div>
    <div class="strip-meta">진척률 <b id="stripPct">—</b></div>
  </div>
</div>

<div class="shell">
  <aside class="side" id="side"></aside>
  <main class="main" id="main"><div class="loading">불러오는 중…</div></main>
</div>

<script src="/pages/nav.js"></script>
<script>
(() => {
'use strict';

const REPO   = 'seoyeonDev/doit-algorithm-study';
const BRANCH = 'main';
const GH_RAW = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;
const GH_URL = `https://github.com/${REPO}`;

// Members (fixed, based on repo)
const MEMBERS = [
  { name: '김혜원', color: '#4a8a5c' },
  { name: '이서연', color: '#c96442' },
];
const _mCache = {};
function memberOf(filename) {
  const base = filename.replace(/\.[^.]+$/, '');
  if (!_mCache[base]) {
    const idx = Object.keys(_mCache).length % MEMBERS.length;
    _mCache[base] = MEMBERS[idx];
  }
  return _mCache[base];
}

const FOLDER_DESC = {
  problem:  '주차 문제 파일 (.md)',
  summary:  '스터디원 요약 노트 (.md)',
  practice: '연습 코드 (.py)',
  solved:   '제출 풀이 코드 (.py)',
};

const ICONS = {
  folder: `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M3 5.5C3 4.67 3.67 4 4.5 4h4.2c.4 0 .78.16 1.06.44L11.3 5.6c.28.28.66.44 1.06.44h7.14C20.33 6.04 21 6.7 21 7.54v10.92c0 .83-.67 1.5-1.5 1.5h-15A1.5 1.5 0 013 18.46V5.5z"/></svg>`,
  folderOpen: `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M3 5.5C3 4.67 3.67 4 4.5 4h4.2c.4 0 .78.16 1.06.44L11.3 5.6c.28.28.66.44 1.06.44h7.14C20.33 6.04 21 6.7 21 7.54V9H3V5.5zM3 10h18l-1.7 8.8c-.14.7-.76 1.2-1.47 1.2H6.17c-.71 0-1.33-.5-1.47-1.2L3 10z"/></svg>`,

function fileIcon(name) {
  if (name.endsWith('.md'))  return ICONS.md;
  if (name.endsWith('.py'))  return ICONS.py;
  return ICONS.file;
}

function ghApi(p) { return `/api/github?path=${encodeURIComponent(p)}`; }
function weekDir(n) { return `week${String(n).padStart(2,'0')}`; }
function weekNum(w) { return parseInt(w.num.replace('W','')); }

// ── data ──
let _weeks = null;
async function getWeeks() {
  if (_weeks) return _weeks;
  _weeks = await fetch('/pages/weeks.json').then(r => r.json());
  return _weeks;
}

let _fileCache = {};
async function getFiles(num, folder) {
  const key = `${num}:${folder}`;
  if (_fileCache[key]) return _fileCache[key];
  const dir = weekDir(num);
  try {
    const res = await fetch(ghApi(`repos/${REPO}/contents/${dir}/${folder}?ref=${BRANCH}`));
    if (!res.ok) { _fileCache[key] = []; return []; }
    const data = await res.json();
    _fileCache[key] = Array.isArray(data)
      ? data.filter(f => f.type === 'file' && f.name !== '.gitkeep')
      : [];
  } catch { _fileCache[key] = []; }
  return _fileCache[key];
}

function computeStatus(weeks, year) {
  const today = new Date(); today.setHours(0,0,0,0);
  const dates = weeks.map(w => { const [m,d] = w.date.split('/'); return new Date(year, +m-1, +d); });
  let ci = -1;
  for (let i = 0; i < dates.length; i++) {
    const start = i === 0 ? new Date(0) : new Date(dates[i-1].getTime() + 86400000);
    if (today >= start && today <= dates[i]) { ci = i; break; }
  }
  if (ci < 0) return weeks.map(w => ({ ...w, status: 'done' }));
  return weeks.map((w,i) => ({ ...w, status: i < ci ? 'done' : i === ci ? 'current' : 'upcoming' }));
}

// ── routing ──
let route = decodeURIComponent(location.hash.replace(/^#/,'') || 'home');

function go(r) {
  route = r;
  location.hash = encodeURIComponent(r);
  render();
}

function parseRoute(r) {
  const parts = r.split(':');
  return {
    view:   parts[0],
    num:    parts[1] ? parseInt(parts[1]) : null,
    folder: parts[2] || null,
    file:   parts.slice(3).join(':') || null,
  };
}

// ── strip ──
function renderStrip(computed) {
  const done  = computed.filter(w => w.status === 'done').length;
  const total = computed.length;
  document.getElementById('stripPct').textContent = `${Math.round(done/total*100)}%`;
  document.getElementById('stripTrack').style.gridTemplateColumns = `repeat(${total},1fr)`;
  document.getElementById('stripTrack').innerHTML = computed.map(w => {
    const n = weekNum(w);
    const isDone = w.status === 'done';
    const isNow  = w.status === 'current';
    return `<div class="strip-cell ${isDone?'done':''} ${isNow?'now':''}" data-phase="${w.phase}" data-num="${n}" title="${w.num} — ${w.title}">
      <div class="strip-bar"></div>
      <div class="strip-num">${n}</div>
    </div>`;
  }).join('');
  document.getElementById('stripTrack').querySelectorAll('.strip-cell').forEach(el => {
    el.onclick = () => go('week:' + el.dataset.num);
  });
}

// ── crumb ──
function renderCrumb(r) {
  const c = document.getElementById('crumb');
  const parts = r.split(':');
  const a = (label, goRoute) => `<a data-go="${goRoute}">${label}</a>`;
  const sep = `<span class="sep">/</span>`;
  const here = label => `<span class="here">${label}</span>`;

  if (r === 'home')       { c.innerHTML = here('홈'); return; }
  if (r === 'curriculum') { c.innerHTML = a('홈','home') + sep + here('커리큘럼'); c.querySelectorAll('[data-go]').forEach(el=>el.onclick=e=>{e.preventDefault();go(el.dataset.go);}); return; }
  if (r === 'problems')   { c.innerHTML = a('홈','home') + sep + here('문제 모음'); c.querySelectorAll('[data-go]').forEach(el=>el.onclick=e=>{e.preventDefault();go(el.dataset.go);}); return; }

  if (parts[0] === 'week') {
    c.innerHTML = a('홈','home') + sep + here(`week${String(parts[1]).padStart(2,'0')}`);
  } else if (parts[0] === 'folder') {
    c.innerHTML = a('홈','home') + sep + a(`week${String(parts[1]).padStart(2,'0')}`, `week:${parts[1]}`) + sep + here(parts[2]);
  } else if (parts[0] === 'file') {
    c.innerHTML = a('홈','home') + sep + a(`week${String(parts[1]).padStart(2,'0')}`,`week:${parts[1]}`) + sep + a(parts[2],`folder:${parts[1]}:${parts[2]}`) + sep + here(parts[3]);
  }
  c.querySelectorAll('[data-go]').forEach(el => el.onclick = e => { e.preventDefault(); go(el.dataset.go); });
}

async function renderSide(r, computed) {
  const side = document.getElementById('side');
  const p = parseRoute(r);

  // pre-fetch files for the open folder so we can show them in the tree
  let openFiles = [];
  if (p.num && p.folder) {
    openFiles = await getFiles(p.num, p.folder);
  }

  let totalFiles = 0;
  computed.forEach(w => {
    const n = weekNum(w);
    // count from cache only (don't trigger extra fetches here)
    Object.keys(FOLDER_DESC).forEach(fn => {
      const key = `${n}:${fn}`;
      if (_fileCache[key]) totalFiles += _fileCache[key].length;
    });
  });

  const PAGES = [
    { route: 'home',       label: '홈' },
    { route: 'curriculum', label: '커리큘럼' },
    { route: 'problems',   label: '문제 모음' },
  ];

  let html = `
    <div class="side-section">PAGES <span class="count">${PAGES.length}</span></div>
    <div class="tree">
      ${PAGES.map(pg => `
        <div class="row pageRow ${r===pg.route?'on':''}" data-route="${pg.route}">
          <span class="chev"></span>
          <span class="icon">${ICONS.file}</span>
          <span class="name">${pg.label}</span>
        </div>`).join('')}
    </div>
    <div class="side-section">WEEKS ${totalFiles ? `<span class="count">${totalFiles} FILES</span>` : ''}</div>
    <div class="tree">`;

  computed.forEach(w => {
    const n = weekNum(w);
    const isOpen   = p.num === n && r !== 'home';
    const isOnWeek = r === `week:${n}`;

    html += `
      <div class="row weekRow ${isOpen?'open':''} ${isOnWeek?'on':''}" data-num="${n}" data-phase="${w.phase}">
        <span class="chev">▸</span>
        <span class="dot"></span>
        <span class="icon">${isOpen ? ICONS.folderOpen : ICONS.folder}</span>
        <span class="name"><span class="num">${String(n).padStart(2,'0')}</span>${w.title.replace(/🎉\s*/,'')}</span>
      </div>
      <div class="children">
        ${Object.keys(FOLDER_DESC).map(fn => {
          const folderRoute  = `folder:${n}:${fn}`;
          const isFolderOpen = r === folderRoute || r.startsWith(`file:${n}:${fn}:`);
          const isFolderOn   = r === folderRoute;
          const activeFile   = r.startsWith(`file:${n}:${fn}:`) ? r.split(':').slice(3).join(':') : null;
          const cachedCount  = (_fileCache[`${n}:${fn}`] || []).length;

          let filesHtml = '';
          if (isFolderOpen && openFiles.length > 0) {
            filesHtml = `<div class="children">
              ${openFiles.map(f => `
                <div class="row l3 fileRow ${f.name === activeFile ? 'on' : ''}" data-num="${n}" data-folder="${fn}" data-name="${f.name}">
                  <span class="chev"></span>
                  <span class="icon">${fileIcon(f.name)}</span>
                  <span class="name">${f.name}</span>
                </div>`).join('')}
            </div>`;
          } else if (isFolderOpen && openFiles.length === 0) {
            filesHtml = `<div class="children">
              <div class="row l3" style="color:var(--mute);pointer-events:none">
                <span class="chev"></span><span class="name">비어 있음</span>
              </div>
            </div>`;
          }

          return `
            <div class="row l2 folderRow ${isFolderOpen?'open':''} ${isFolderOn?'on':''}" data-num="${n}" data-folder="${fn}">
              <span class="chev">▸</span>
              <span class="icon">${isFolderOpen ? ICONS.folderOpen : ICONS.folder}</span>
              <span class="name">${fn}</span>
              ${cachedCount ? `<span class="badge">${cachedCount}</span>` : ''}
            </div>
            ${filesHtml}`;
        }).join('')}
      </div>`;
  });

  html += '</div>';
  side.innerHTML = html;

  side.querySelectorAll('.pageRow').forEach(el => el.onclick = () => go(el.dataset.route));
  side.querySelectorAll('.weekRow').forEach(el => el.onclick = () => go('week:' + el.dataset.num));
  side.querySelectorAll('.folderRow').forEach(el => el.onclick = e => {
    e.stopPropagation();
    go(`folder:${el.dataset.num}:${el.dataset.folder}`);
  });
  side.querySelectorAll('.fileRow').forEach(el => el.onclick = e => {
    e.stopPropagation();
    go(`file:${el.dataset.num}:${el.dataset.folder}:${el.dataset.name}`);
  });
}

  const m       = memberOf(fileName);

    const res = await fetch(rawUrl);
    if (res.ok) text = await res.text(); else err = true;
  } catch { err = true; }

  const lines = text.split('\n').length;
  const words = text.split(/\s+/).filter(Boolean).length;
  const readMin = Math.max(1, Math.round(words / 200));

  const metaRight = isMd
    ? `<span>~${readMin}분 읽기</span><a href="${ghUrl}" target="_blank" rel="noopener" style="color:var(--mute)">GitHub ↗</a>`
    : `<span>${lines}줄</span><a href="${ghUrl}" target="_blank" rel="noopener" style="color:var(--mute)">GitHub ↗</a>`;

      <span><span class="avatar" style="background:${m.color}">${m.name[0]}</span>${m.name}</span>

  let body;
  if (err) {
    body = `<div style="border:1px solid var(--border);border-top:0;border-radius:0 0 10px 10px;background:var(--panel)"><div class="empty">파일을 불러올 수 없습니다.</div></div>`;
  } else if (isMd) {
    body = `<article class="reader">${marked.parse(text)}</article>`;
  } else {
    const esc = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const lineNums = text.split('\n').map((_,i)=>`<span>${i+1}</span>`).join('');
    body = `<div class="codeview">
      <div class="ln">${lineNums}</div>
      <pre>${esc}</pre>
    </div>`;
  }

  document.getElementById('main').innerHTML = filebar + body;
  bindGo();
}

function bindGo() {
  document.querySelectorAll('[data-go]').forEach(el => {
    el.onclick = e => { e.preventDefault(); go(el.dataset.go); };
  });
}

// ── router ──
async function render() {
  const { weeks, year } = await getWeeks();
  const computed = computeStatus(weeks, year);

  renderStrip(computed);
  renderCrumb(route);
  await renderSide(route, computed);

  const p = parseRoute(route);

  if (route === 'home' || p.view === 'home') {
    await renderHome(computed);
  } else if (route === 'curriculum') {
    renderCurriculum(computed);
  } else if (route === 'problems') {
    renderProblems(computed);
  } else if (p.view === 'week') {
    await renderWeek(p.num, computed);
  } else if (p.view === 'folder') {
    await renderFolder(p.num, p.folder, computed);
  } else if (p.view === 'file') {
    await renderFile(p.num, p.folder, p.file, computed);
  } else {
    await renderHome(computed);
  }
}

window.addEventListener('hashchange', () => {
  const r = decodeURIComponent(location.hash.replace(/^#/,'') || 'home');
  if (r !== route) { route = r; render(); }
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === '1') go('home');
  if (e.key === 'Escape') go('home');
});

render();
})();
</script>
</body>
</html>
